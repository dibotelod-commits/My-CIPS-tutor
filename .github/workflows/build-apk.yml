name: Build and Sign Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build web assets
      run: npm run build

    - name: Install Capacitor CLI
      run: npm install @capacitor/cli @capacitor/core

    - name: Add Android platform
      run: npx cap add android || true

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Sign APK
      run: |
        cd android/app/build/outputs/apk/release
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore ${{ secrets.KEYSTORE_FILE }} \
          app-release-unsigned.apk ${{ secrets.KEY_ALIAS }}

        # Align and finalize APK
        zipalign -v 4 app-release-unsigned.apk app-release-signed.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v3
      with:
        name: MyApp-Release-APK
        path: android/app/build/outputs/apk/release/app-release-signed.apk